<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sentinel Honeypot — Live Dashboard</title>
  <!-- Chart.js vendored locally so the dashboard works in isolated/air-gapped deployments. -->
  <script src="/static/chart.umd.min.js"></script>
  <style>
    :root { --bg:#0b0f17; --panel:#141b2d; --ink:#e6edf3; --muted:#8b98a9; --accent:#3fb950; --danger:#f85149; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font-family:system-ui,Segoe UI,Roboto,sans-serif; }
    header { padding:18px 24px; border-bottom:1px solid #20283b; display:flex; align-items:center; justify-content:space-between; }
    header h1 { font-size:18px; margin:0; letter-spacing:.5px; }
    header .dot { color:var(--accent); }
    .wrap { padding:24px; max-width:1200px; margin:0 auto; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
    .card { background:var(--panel); border:1px solid #20283b; border-radius:12px; padding:18px; }
    .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.6px; }
    .card .v { font-size:30px; font-weight:700; margin-top:6px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .panel { background:var(--panel); border:1px solid #20283b; border-radius:12px; padding:18px; margin-bottom:16px; }
    .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin:0 0 12px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { text-align:left; padding:8px 10px; border-bottom:1px solid #20283b; }
    th { color:var(--muted); font-weight:600; }
    code { color:var(--accent); }
    .toolbar a { color:var(--ink); text-decoration:none; background:#1f2940; padding:7px 12px; border-radius:8px; font-size:12px; margin-left:8px; border:1px solid #2b3756; }
    .toolbar a:hover { border-color:var(--accent); }
    @media (max-width:820px){ .grid2{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <header>
    <h1><span class="dot">●</span> SENTINEL HONEYPOT</h1>
    <div class="toolbar">
      <a href="/api/iocs?format=csv">Export IOCs (CSV)</a>
      <a href="/api/iocs?format=stix">Export STIX</a>
    </div>
  </header>
  <div class="wrap">
    <div class="cards">
      <div class="card"><div class="k">Total Events</div><div class="v" id="total">—</div></div>
      <div class="card"><div class="k">Unique Attackers</div><div class="v" id="unique">—</div></div>
      <div class="card"><div class="k">Ports Targeted</div><div class="v" id="ports">—</div></div>
      <div class="card"><div class="k">Countries</div><div class="v" id="countries">—</div></div>
    </div>

    <div class="grid2">
      <div class="panel"><h2>Attack Timeline</h2><canvas id="timeline" height="160"></canvas></div>
      <div class="panel"><h2>Hits by Service / Port</h2><canvas id="ports_chart" height="160"></canvas></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h2>Top Attackers</h2>
        <table><thead><tr><th>Source IP</th><th>Country</th><th>Hits</th><th>Last Seen</th></tr></thead>
        <tbody id="attackers"></tbody></table>
      </div>
      <div class="panel">
        <h2>Recent Activity</h2>
        <table><thead><tr><th>Time</th><th>Source</th><th>Port</th><th>Service</th></tr></thead>
        <tbody id="recent"></tbody></table>
      </div>
    </div>
  </div>

  <script>
    let timelineChart, portsChart;

    function fmtTime(iso) { return (iso || "").replace("T", " ").slice(0, 19); }

    async function refresh() {
      const [stats, events] = await Promise.all([
        fetch("/api/stats").then(r => r.json()),
        fetch("/api/events?limit=15").then(r => r.json()),
      ]);

      document.getElementById("total").textContent = stats.total_events;
      document.getElementById("unique").textContent = stats.unique_attackers;
      document.getElementById("ports").textContent = stats.hits_by_port.length;
      document.getElementById("countries").textContent = stats.hits_by_country.length;

      const atk = document.getElementById("attackers");
      atk.innerHTML = stats.top_attackers.map(a =>
        `<tr><td><code>${a.src_ip}</code></td><td>${a.country || "—"}</td><td>${a.hits}</td><td>${fmtTime(a.last_seen)}</td></tr>`
      ).join("") || `<tr><td colspan="4">No activity yet.</td></tr>`;

      const rec = document.getElementById("recent");
      rec.innerHTML = events.map(e =>
        `<tr><td>${fmtTime(e.timestamp)}</td><td><code>${e.src_ip}</code></td><td>${e.dst_port}</td><td>${e.service}</td></tr>`
      ).join("") || `<tr><td colspan="4">No activity yet.</td></tr>`;

      drawTimeline(stats.timeline);
      drawPorts(stats.hits_by_port);
    }

    function drawTimeline(data) {
      const labels = data.map(d => d.bucket);
      const values = data.map(d => d.hits);
      if (timelineChart) { timelineChart.data.labels = labels; timelineChart.data.datasets[0].data = values; timelineChart.update(); return; }
      timelineChart = new Chart(document.getElementById("timeline"), {
        type: "line",
        data: { labels, datasets: [{ label: "Events", data: values, borderColor: "#3fb950", backgroundColor: "rgba(63,185,80,.15)", fill: true, tension: .3 }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#8b98a9" } }, y: { ticks: { color: "#8b98a9" } } } }
      });
    }

    function drawPorts(data) {
      const labels = data.map(d => `${d.service}/${d.dst_port}`);
      const values = data.map(d => d.hits);
      if (portsChart) { portsChart.data.labels = labels; portsChart.data.datasets[0].data = values; portsChart.update(); return; }
      portsChart = new Chart(document.getElementById("ports_chart"), {
        type: "bar",
        data: { labels, datasets: [{ label: "Hits", data: values, backgroundColor: "#388bfd" }] },
        options: { plugins: { legend: { display: false } }, scales: { x: { ticks: { color: "#8b98a9" } }, y: { ticks: { color: "#8b98a9" } } } }
      });
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
